services:
  nodeserver_staging:
    restart: always
    env_file:
      - .env
    build:
      context: .
    ports:
      - "${NODE_PORT_EXTERNAL_STAGING}:3000"
    environment:
      NODE_ENV: production
      ORIGIN: ${ORIGIN}
      LINKCHECK_TARGET_URL: ${LINKCHECK_TARGET_URL}
    extra_hosts:
      - "${LINKCHECK_PUBLIC_HOST}:host-gateway"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "const u=new URL(process.env.LINKCHECK_TARGET_URL);require(u.protocol==='https:'?'https':'http').get({hostname:u.hostname,port:u.port||(u.protocol==='https:'?443:80),path:u.pathname||'/',rejectUnauthorized:false},r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  linkcheck:
    image: raviqqe/muffet:latest
    depends_on:
      nodeserver_staging:
        condition: service_healthy
    restart: "no"
    extra_hosts:
      - "${LINKCHECK_PUBLIC_HOST}:host-gateway"
    command:
      - --verbose
      - --buffer-size=131072
      - --max-connections=16
      - --max-connections-per-host=8
      - --timeout=20
      - --max-redirections=5
      - "--exclude=openstreetmap\\.org/.*#"
      - "--exclude=^mailto:"
      - "--exclude=^tel:"
      - "--exclude=doctolib\\.fr"
      - --exclude=/signin
      - --exclude=/signout
      - "${LINKCHECK_TARGET_URL}"
